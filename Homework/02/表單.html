<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>科技論壇會員註冊</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        fieldset { margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; }
        legend { font-weight: bold; background-color: #eee; padding: 5px 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: inline-block; width: 120px; vertical-align: top; }
        .hint { font-size: 0.8em; color: #666; }
    </style>
</head>
<body>

    <h2>科技論壇會員註冊</h2>

    <form action="/submit_registration" method="POST" enctype="multipart/form-data">
        
        <fieldset>
            <legend>帳號資訊</legend>
            
            <div class="form-group">
                <label for="username">使用者名稱：</label>
                <input type="text" id="username" name="username" placeholder="請輸入至少4個字元" required>
            </div>

            <div class="form-group">
                <label for="email">電子郵件：</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="pwd">密碼：</label>
                <input type="password" id="pwd" name="password" required>
            </div>
        </fieldset>

        <fieldset>
            <legend>個人資料</legend>

            <div class="form-group">
                <label for="birthday">出生日期：</label>
                <input type="date" id="birthday" name="birthday">
            </div>

            <div class="form-group">
                <label>身份別：</label>
                <input type="radio" id="student" name="status" value="student" checked>
                <label for="student" style="width:auto;">學生</label>
                
                <input type="radio" id="professional" name="status" value="professional">
                <label for="professional" style="width:auto;">社會人士</label>
            </div>

            <div class="form-group">
                <label for="education">最高學歷：</label>
                <select id="education" name="education">
                    <option value="" disabled selected>請選擇...</option>
                    <option value="highschool">高中職</option>
                    <option value="bachelor">大學</option>
                    <option value="master">碩士</option>
                    <option value="phd">博士</option>
                </select>
            </div>
        </fieldset>

        <fieldset>
            <legend>專業與興趣</legend>

            <div class="form-group">
                <label>感興趣的領域：<br><span class="hint">(可多選)</span></label>
                <input type="checkbox" id="interest_sec" name="interests" value="security">
                <label for="interest_sec" style="width:auto;">資訊安全</label><br>
                
                <label></label> <input type="checkbox" id="interest_ai" name="interests" value="ai">
                <label for="interest_ai" style="width:auto;">人工智慧與機器學習</label><br>

                <label></label>
                <input type="checkbox" id="interest_net" name="interests" value="networking">
                <label for="interest_net" style="width:auto;">網路技術與架構</label>
            </div>

            <div class="form-group">
                <label for="resume">上傳個人簡歷：</label>
                <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx">
            </div>
        </fieldset>

        <fieldset>
            <legend>其他</legend>
            <div class="form-group">
                <label for="intro">自我介紹：</label>
                <textarea id="intro" name="intro" rows="4" cols="50" placeholder="跟大家簡單介紹一下你自己吧！"></textarea>
            </div>
        </fieldset>

        <div class="form-group">
            <button type="submit">送出註冊資料</button>
            <button type="reset">清除重填</button>
        </div>

    </form>
    </body>
</html>
