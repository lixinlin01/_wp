<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科技產品深度評測表單</title>
    <style>
        /* =========================================
           基本重置與全域設定
        ========================================= */
        * {
            box-sizing: border-box; /* 確保 padding 和 border 不會增加元素的總寬度 */
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e9ecef; /* 柔和的淺灰背景 */
            color: #333;
            line-height: 1.6;
            padding: 40px 20px;
        }

        /* =========================================
           表單容器與標題樣式
        ========================================= */
        .form-container {
            max-width: 650px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px 40px;
            border-radius: 12px; /* 圓角設計 */
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08); /* 增加立體感的陰影 */
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #2c3e50;
            font-size: 24px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }

        /* =========================================
           表單元件排版
        ========================================= */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #495057;
            font-size: 14px;
        }

        /* =========================================
           輸入框外觀設計 (利用屬性選擇器一次選取)
        ========================================= */
        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="search"],
        input[type="tel"],
        input[type="url"],
        input[type="number"],
        input[type="date"],
        input[type="time"],
        input[type="datetime-local"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 15px;
            background-color: #f8f9fa;
            transition: all 0.3s ease; /* 平滑的過渡動畫 */
        }

        /* 聚焦狀態：當使用者點擊輸入框時的視覺回饋 */
        input:focus, textarea:focus {
            border-color: #3498db;
            background-color: #ffffff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }

        /* =========================================
           特殊 Input 樣式微調
        ========================================= */
        input[type="color"] {
            width: 100%;
            height: 45px;
            padding: 2px;
            cursor: pointer;
            border: 1px solid #ced4da;
            border-radius: 6px;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        input[type="file"] {
            padding: 10px;
            background-color: #f8f9fa;
            border: 1px dashed #ced4da;
            border-radius: 6px;
            width: 100%;
            cursor: pointer;
        }

        /* =========================================
           單選框(Radio)與複選框(Checkbox)的水平排列
        ========================================= */
        .checkbox-group, .radio-group {
            display: flex;
            gap: 20px; /* 控制選項之間的間距 */
            align-items: center;
            padding: 5px 0;
        }

        /* 覆蓋掉 label 預設的 display: block，讓文字跟框框排在同一行 */
        .inline-label {
            display: inline;
            font-weight: normal;
            margin-bottom: 0;
            cursor: pointer;
        }

        /* =========================================
           按鈕區域設計 (使用 Flexbox 均分寬度)
        ========================================= */
        .button-group {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 15px;
        }

        .btn {
            flex: 1; /* 讓三個按鈕平分寬度 */
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            color: #fff;
            transition: background 0.3s, transform 0.1s;
        }

        /* 點擊按鈕時的微縮放效果 */
        .btn:active {
            transform: scale(0.97);
        }

        /* 針對不同功能的按鈕設定不同顏色 */
        .btn-reset {
            background-color: #e74c3c; /* 紅色：警告/刪除/重置 */
        }
        .btn-reset:hover {
            background-color: #c0392b;
        }

        .btn-save {
            background-color: #f39c12; /* 橘黃色：中性操作/暫存 */
        }
        .btn-save:hover {
            background-color: #d68910;
        }

        .btn-submit {
            background-color: #2ecc71; /* 綠色：確認/送出/成功 */
        }
        .btn-submit:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>科技產品深度評測報告</h2>
    
    <form action="#" method="POST" enctype="multipart/form-data">
        
        <input type="hidden" name="form_id" value="tech_review_2026">

        <div class="form-group">
            <label for="search-product">搜尋評測產品型號：</label>
            <input type="search" id="search-product" name="search-product" placeholder="例如：Pixel 8 Pro">
        </div>

        <div class="form-group">
            <label for="reviewer-name">評測者姓名：</label>
            <input type="text" id="reviewer-name" name="reviewer-name" required>
        </div>

        <div class="form-group">
            <label for="reviewer-email">聯絡信箱：</label>
            <input type="email" id="reviewer-email" name="reviewer-email" required>
        </div>

        <div class="form-group">
            <label for="reviewer-tel">聯絡電話：</label>
            <input type="tel" id="reviewer-tel" name="reviewer-tel" pattern="[0-9]{4}-[0-9]{6}" placeholder="格式：0912-345678">
        </div>

        <div class="form-group">
            <label for="review-password">審核權限密碼：</label>
            <input type="password" id="review-password" name="review-password" placeholder="請輸入您的評測員密碼">
        </div>

        <div class="form-group">
            <label for="product-url">產品官網連結：</label>
            <input type="url" id="product-url" name="product-url" placeholder="https://...">
        </div>

        <div class="form-group">
            <label for="purchase-date">取得產品日期：</label>
            <input type="date" id="purchase-date" name="purchase-date">
        </div>

        <div class="form-group">
            <label for="unboxing-time">首次開箱時間：</label>
            <input type="datetime-local" id="unboxing-time" name="unboxing-time">
        </div>

        <div class="form-group">
            <label for="testing-time">每日固定測試時間：</label>
            <input type="time" id="testing-time" name="testing-time">
        </div>

        <div class="form-group">
            <label for="product-color">產品外觀主色調：</label>
            <input type="color" id="product-color" name="product-color" value="#000000">
        </div>

        <div class="form-group">
            <label for="product-price">建議售價 (TWD)：</label>
            <input type="number" id="product-price" name="product-price" min="0" step="100" placeholder="例如：29900">
        </div>

        <div class="form-group">
            <label for="satisfaction">整體滿意度分數 (0-100)：</label>
            <input type="range" id="satisfaction" name="satisfaction" min="0" max="100" value="85">
        </div>

        <div class="form-group">
            <label>本次重點測試項目 (可多選)：</label>
            <div class="checkbox-group">
                <input type="checkbox" id="test-screen" name="tests" value="screen">
                <label for="test-screen" class="inline-label">螢幕顯示</label>
                
                <input type="checkbox" id="test-battery" name="tests" value="battery">
                <label for="test-battery" class="inline-label">電池續航</label>
                
                <input type="checkbox" id="test-camera" name="tests" value="camera">
                <label for="test-camera" class="inline-label">相機拍攝</label>
            </div>
        </div>

        <div class="form-group">
            <label>是否推薦給一般消費者？</label>
            <div class="radio-group">
                <input type="radio" id="recommend-yes" name="recommend" value="yes" checked>
                <label for="recommend-yes" class="inline-label">極力推薦</label>
                
                <input type="radio" id="recommend-no" name="recommend" value="no">
                <label for="recommend-no" class="inline-label">不推薦</label>
            </div>
        </div>

        <div class="form-group">
            <label for="product-image">上傳實機測試照片：</label>
            <input type="file" id="product-image" name="product-image" accept="image/*">
        </div>

        <div class="form-group">
            <label for="detailed-review">詳細評測總結：</label>
            <textarea id="detailed-review" name="detailed-review" rows="4" placeholder="請描述您的使用體驗..."></textarea>
        </div>

        <div class="button-group">
            <input type="reset" value="重新填寫 (Reset)" class="btn btn-reset">
            
            <input type="button" value="保存草稿 (Button)" class="btn btn-save" onclick="alert('草稿已暫存！')">
            
            <input type="submit" value="送出評測 (Submit)" class="btn btn-submit">
        </div>

    </form>
</div>

</body>
</html>
